<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Projects</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    .progress-fill { transition: width 0.3s ease; }
  </style>
</head>
<body class="bg-gray-50 font-sans antialiased p-4 md:p-8">

  <div class="max-w-7xl mx-auto">

    <!-- Header with Add Button & Logout -->
    <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
      <h1 class="text-3xl font-bold text-purple-700 flex items-center gap-2">
        <i class="fas fa-project-diagram text-purple-500"></i> My Projects
      </h1>
      <div class="flex flex-wrap items-center gap-3">
        <button id="showCreateModalBtn"
                class="bg-purple-600 hover:bg-purple-700 text-white font-semibold py-2 px-5 rounded-lg shadow-sm transition flex items-center gap-2">
          <i class="fas fa-plus"></i> Add Project
        </button>
        <a href="/dashboard.html" class="bg-white hover:bg-gray-50 text-purple-600 border border-purple-200 font-medium py-2 px-4 rounded-lg shadow-sm transition flex items-center gap-2 text-sm">
        <i class="fas fa-chart-pie"></i> Dashboard
        </a>
        <span id="userEmailDisplay" class="text-sm text-gray-600 bg-white px-3 py-1.5 rounded-full shadow-sm border border-gray-200">
          <i class="fas fa-user-circle text-purple-500 mr-1"></i> <span id="userEmail">Loading...</span>
        </span>
        <button id="logoutBtn"
                class="bg-white hover:bg-gray-100 text-gray-700 border border-gray-200 font-medium py-2 px-4 rounded-lg shadow-sm transition flex items-center gap-2 text-sm">
          <i class="fas fa-sign-out-alt text-purple-500"></i> Logout
        </button>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
      <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-purple-500">
        <p class="text-sm text-gray-500">Total Projects</p>
        <p class="text-2xl font-bold text-purple-700" id="totalProjects">0</p>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-green-500">
        <p class="text-sm text-gray-500">Completed</p>
        <p class="text-2xl font-bold text-green-600" id="completedProjects">0</p>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-4 border-l-4 border-blue-500">
        <p class="text-sm text-gray-500">Active</p>
        <p class="text-2xl font-bold text-blue-600" id="activeProjects">0</p>
      </div>
    </div>

    <!-- Projects Table -->
    <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-purple-50">
            <tr>
              <th class="px-6 py-4 text-left text-xs font-semibold text-purple-800 uppercase tracking-wider">Project</th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-purple-800 uppercase tracking-wider">Description</th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-purple-800 uppercase tracking-wider">Status</th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-purple-800 uppercase tracking-wider">Progress</th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-purple-800 uppercase tracking-wider">Deadline</th>
              <th class="px-6 py-4 text-right text-xs font-semibold text-purple-800 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody id="projectTableBody" class="divide-y divide-gray-100 bg-white"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ========== CREATE MODAL ========== -->
  <div id="createModal"
       class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 hidden transition-opacity">
    <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full mx-4 p-6 transform transition-all">
      <div class="flex justify-between items-center mb-5">
        <h3 class="text-xl font-bold text-purple-700 flex items-center gap-2">
          <i class="fas fa-plus-circle"></i> Create New Project
        </h3>
        <button id="closeCreateModalBtn" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Project Name</label>
          <input type="text" id="createName" placeholder="e.g. Marketing Website"
                 class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-400 focus:border-transparent outline-none" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <input type="text" id="createDesc" placeholder="Brief description"
                 class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-400 focus:border-transparent outline-none" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Deadline</label>
          <input type="date" id="createDeadline"
                 class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-400 focus:border-transparent outline-none" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
          <select id="createStatus"
                  class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-400 focus:border-transparent outline-none bg-white">
            <option value="Active" selected>Active</option>
            <option value="On Hold">On Hold</option>
            <option value="Completed">Completed</option>
            <option value="Archived">Archived</option>
          </select>
        </div>
      </div>

      <div class="flex justify-end gap-3 mt-6">
        <button id="cancelCreateBtn"
                class="px-5 py-2.5 border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50 transition">
          Cancel
        </button>
        <button id="saveCreateBtn"
                class="px-6 py-2.5 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-lg shadow-sm transition flex items-center gap-2">
          <i class="fas fa-check"></i> Create Project
        </button>
      </div>
    </div>
  </div>

  <!-- ========== EDIT MODAL ========== -->
  <div id="editModal"
       class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 hidden transition-opacity">
    <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full mx-4 p-6 transform transition-all">
      <div class="flex justify-between items-center mb-5">
        <h3 class="text-xl font-bold text-purple-700 flex items-center gap-2">
          <i class="fas fa-pen"></i> Edit Project
        </h3>
        <button id="closeEditModalBtn" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
      </div>
      <input type="hidden" id="editProjectId" />
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Project Name</label>
          <input type="text" id="editName"
                 class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-400 focus:border-transparent outline-none" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <input type="text" id="editDesc"
                 class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-400 focus:border-transparent outline-none" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Deadline</label>
          <input type="date" id="editDeadline"
                 class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-400 focus:border-transparent outline-none" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
          <select id="editStatus"
                  class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-400 focus:border-transparent outline-none bg-white">
            <option value="Active">Active</option>
            <option value="On Hold">On Hold</option>
            <option value="Completed">Completed</option>
            <option value="Archived">Archived</option>
          </select>
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-6">
        <button id="cancelEditBtn"
                class="px-5 py-2.5 border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50 transition">Cancel</button>
        <button id="saveEditBtn"
                class="px-6 py-2.5 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-lg shadow-sm transition flex items-center gap-2">
          <i class="fas fa-save"></i> Update Project
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from '../js/supabase.js';

    // ---- AUTH GUARD ----
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) {
      window.location.href = '/index.html';
      throw new Error('Redirecting to login...');
    }

    document.getElementById('userEmail').textContent = user.email;

    // ---- LOGOUT ----
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = '/index.html';
    });

    // ---- DOM refs ----
    const tbody = document.getElementById('projectTableBody');
    const totalEl = document.getElementById('totalProjects');
    const completedEl = document.getElementById('completedProjects');
    const activeEl = document.getElementById('activeProjects');

    // Create Modal refs
    const createModal = document.getElementById('createModal');
    const createName = document.getElementById('createName');
    const createDesc = document.getElementById('createDesc');
    const createDeadline = document.getElementById('createDeadline');
    const createStatus = document.getElementById('createStatus');
    const showCreateBtn = document.getElementById('showCreateModalBtn');
    const closeCreateBtn = document.getElementById('closeCreateModalBtn');
    const cancelCreateBtn = document.getElementById('cancelCreateBtn');
    const saveCreateBtn = document.getElementById('saveCreateBtn');

    // Edit Modal refs
    const editModal = document.getElementById('editModal');
    const editId = document.getElementById('editProjectId');
    const editName = document.getElementById('editName');
    const editDesc = document.getElementById('editDesc');
    const editDeadline = document.getElementById('editDeadline');
    const editStatus = document.getElementById('editStatus');
    const closeEditBtn = document.getElementById('closeEditModalBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const saveEditBtn = document.getElementById('saveEditBtn');

    // ---- Helpers ----
    function statusBadgeClass(status) {
      const map = {
        'Active': 'bg-purple-100 text-purple-800',
        'On Hold': 'bg-yellow-100 text-yellow-800',
        'Completed': 'bg-green-100 text-green-800',
        'Archived': 'bg-gray-100 text-gray-800',
      };
      return map[status] || 'bg-gray-100 text-gray-800';
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function openModal(modal) {
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeModal(modal) {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    // ---- LOAD PROJECTS ----
    async function loadProjects() {
      const { data, error } = await supabase
        .from('projects')
        .select('*')
        .eq('user_id', user.id)
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Load error:', error);
        tbody.innerHTML =
          `<tr><td colspan="6" class="text-center py-10 text-red-500"><i class="fas fa-exclamation-triangle"></i> Failed to load projects.</td></tr>`;
        return;
      }

      const total = data?.length || 0;
      const completed = data?.filter(p => p.status === 'Completed').length || 0;
      const active = data?.filter(p => p.status === 'Active').length || 0;
      totalEl.textContent = total;
      completedEl.textContent = completed;
      activeEl.textContent = active;

      if (!data || data.length === 0) {
        tbody.innerHTML =
          `<tr><td colspan="6" class="text-center py-12 text-gray-400"><i class="fas fa-inbox text-3xl block mb-2"></i>No projects yet. Click "Add Project" to start!</td></tr>`;
        return;
      }

    tbody.innerHTML = data.map(p => `
    <tr class="hover:bg-purple-50/50 transition">
        <td class="px-6 py-4 font-medium text-gray-800">${escapeHtml(p.name)}</td>
        <td class="px-6 py-4 text-gray-500 text-sm max-w-xs truncate">${escapeHtml(p.description || '—')}</td>
        <td class="px-6 py-4"><span class="inline-flex px-3 py-1 text-xs font-semibold rounded-full ${statusBadgeClass(p.status)}">${p.status || 'Active'}</span></td>
        <td class="px-6 py-4">
        <div class="flex items-center gap-3">
            <span class="text-sm font-medium text-gray-700">${p.progress || 0}%</span>
            <div class="flex-1 max-w-[100px] h-2 bg-gray-200 rounded-full overflow-hidden">
            <div class="progress-fill h-full bg-purple-600 rounded-full" style="width: ${p.progress || 0}%"></div>
            </div>
        </div>
        </td>
        <td class="px-6 py-4 text-sm text-gray-500">${p.deadline ? new Date(p.deadline).toLocaleDateString() : '—'}</td>
        <td class="px-6 py-4 text-right space-x-1">
        <button class="view-btn text-blue-500 hover:text-blue-700 transition px-2 py-1 rounded" data-id="${p.id}" title="View Details"><i class="fas fa-eye"></i></button>
        <button class="edit-btn text-purple-600 hover:text-purple-800 transition px-2 py-1 rounded" data-id="${p.id}" title="Edit"><i class="fas fa-edit"></i></button>
        <button class="delete-btn text-red-500 hover:text-red-700 transition px-2 py-1 rounded" data-id="${p.id}" title="Delete"><i class="fas fa-trash-alt"></i></button>
        </td>
    </tr>
    `).join('');
      
      document.querySelectorAll('.view-btn').forEach(btn =>
        btn.addEventListener('click', () => {
            window.location.href = `/project-details.html?id=${btn.dataset.id}`;
        })
        );
      document.querySelectorAll('.edit-btn').forEach(btn =>
        btn.addEventListener('click', () => openEditModal(btn.dataset.id))
      );
      document.querySelectorAll('.delete-btn').forEach(btn =>
        btn.addEventListener('click', () => deleteProject(btn.dataset.id))
      );
    }

    // ---- CREATE (via Modal) ----
    async function createProject() {
      const name = createName.value.trim();
      if (!name) return alert('Project name is required.');

      const { error } = await supabase.from('projects').insert([{
        user_id: user.id,
        name,
        description: createDesc.value.trim() || null,
        deadline: createDeadline.value || null,
        status: createStatus.value || 'Active',
        progress: 0,
      }]);

      if (error) {
        console.error(error);
        alert('Failed to create project.');
        return;
      }

      // Reset & close
      createName.value = '';
      createDesc.value = '';
      createDeadline.value = '';
      createStatus.value = 'Active';
      closeModal(createModal);
      loadProjects();
    }

    // ---- DELETE ----
    async function deleteProject(id) {
      if (!confirm('Delete this project and all its tasks?')) return;
      const { error } = await supabase.from('projects').delete().eq('id', id).eq('user_id', user.id);
      if (error) { alert('Failed to delete.'); } else { loadProjects(); }
    }

    // ---- EDIT ----
    async function openEditModal(id) {
      const { data, error } = await supabase
        .from('projects')
        .select('*')
        .eq('id', id)
        .eq('user_id', user.id)
        .single();

      if (error || !data) { alert('Could not load project.'); return; }

      editId.value = data.id;
      editName.value = data.name || '';
      editDesc.value = data.description || '';
      editDeadline.value = data.deadline || '';
      editStatus.value = data.status || 'Active';
      openModal(editModal);
    }

    async function saveEdit() {
      const id = editId.value;
      const updated = {
        name: editName.value.trim(),
        description: editDesc.value.trim() || null,
        deadline: editDeadline.value || null,
        status: editStatus.value,
      };
      if (!updated.name) return alert('Project name cannot be empty.');

      const { error } = await supabase
        .from('projects')
        .update(updated)
        .eq('id', id)
        .eq('user_id', user.id);

      if (error) { alert('Failed to update.'); return; }
      closeModal(editModal);
      loadProjects();
    }

    // ---- Modal Event Listeners ----
    // Create
    showCreateBtn.addEventListener('click', () => openModal(createModal));
    closeCreateBtn.addEventListener('click', () => closeModal(createModal));
    cancelCreateBtn.addEventListener('click', () => closeModal(createModal));
    saveCreateBtn.addEventListener('click', createProject);
    createModal.addEventListener('click', (e) => { if (e.target === createModal) closeModal(createModal); });

    // Edit
    closeEditBtn.addEventListener('click', () => closeModal(editModal));
    cancelEditBtn.addEventListener('click', () => closeModal(editModal));
    saveEditBtn.addEventListener('click', saveEdit);
    editModal.addEventListener('click', (e) => { if (e.target === editModal) closeModal(editModal); });

    // ---- Initial Load ----
    loadProjects();
  </script>
</body>
</html>
