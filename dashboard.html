<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard · Project Flow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body class="bg-gray-50 font-sans antialiased p-4 md:p-8">

  <div class="max-w-7xl mx-auto">

    <!-- Header -->
    <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
      <h1 class="text-3xl font-bold text-purple-700 flex items-center gap-2">
        <i class="fas fa-chart-pie text-purple-500"></i> Dashboard
      </h1>
      <div class="flex flex-wrap items-center gap-3">
        <a href="/project.html" class="bg-white hover:bg-gray-50 text-purple-600 border border-purple-200 font-medium py-2 px-4 rounded-lg shadow-sm transition flex items-center gap-2 text-sm">
          <i class="fas fa-project-diagram"></i> My Projects
        </a>
        <span class="text-sm text-gray-600 bg-white px-3 py-1.5 rounded-full shadow-sm border border-gray-200">
          <i class="fas fa-user-circle text-purple-500 mr-1"></i> <span id="userEmail">Loading...</span>
        </span>
        <button id="logoutBtn" class="bg-white hover:bg-gray-100 text-gray-700 border border-gray-200 font-medium py-2 px-4 rounded-lg shadow-sm transition flex items-center gap-2 text-sm">
          <i class="fas fa-sign-out-alt text-purple-500"></i> Logout
        </button>
      </div>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-purple-500">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-500">Total Projects</p>
            <p class="text-2xl font-bold text-purple-700" id="totalProjects">0</p>
          </div>
          <i class="fas fa-folder-open text-3xl text-purple-300"></i>
        </div>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-blue-500">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-500">Total Tasks</p>
            <p class="text-2xl font-bold text-blue-600" id="totalTasks">0</p>
          </div>
          <i class="fas fa-tasks text-3xl text-blue-300"></i>
        </div>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-green-500">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-500">Completed Tasks</p>
            <p class="text-2xl font-bold text-green-600" id="completedTasks">0</p>
          </div>
          <i class="fas fa-check-circle text-3xl text-green-300"></i>
        </div>
      </div>
      <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-yellow-500">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-500">Upcoming Deadlines</p>
            <p class="text-2xl font-bold text-yellow-600" id="upcomingDeadlines">0</p>
          </div>
          <i class="fas fa-calendar-alt text-3xl text-yellow-300"></i>
        </div>
      </div>
    </div>

    <!-- Charts Row -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
      <div class="bg-white rounded-xl shadow-md border border-gray-100 p-6">
        <h3 class="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2">
          <i class="fas fa-chart-pie text-purple-500"></i> Projects by Status
        </h3>
        <div class="relative" style="height: 250px;">
          <canvas id="projectStatusChart"></canvas>
        </div>
      </div>
      <div class="bg-white rounded-xl shadow-md border border-gray-100 p-6">
        <h3 class="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2">
          <i class="fas fa-chart-pie text-blue-500"></i> Tasks by Status
        </h3>
        <div class="relative" style="height: 250px;">
          <canvas id="taskStatusChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Upcoming Deadlines Table -->
    <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden">
      <div class="px-6 py-4 border-b border-gray-100">
        <h3 class="text-lg font-semibold text-gray-700 flex items-center gap-2">
          <i class="fas fa-clock text-yellow-500"></i> Upcoming Deadlines (next 7 days)
        </h3>
      </div>
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-purple-50">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-semibold text-purple-800 uppercase tracking-wider">Project</th>
              <th class="px-6 py-3 text-left text-xs font-semibold text-purple-800 uppercase tracking-wider">Deadline</th>
              <th class="px-6 py-3 text-left text-xs font-semibold text-purple-800 uppercase tracking-wider">Status</th>
              <th class="px-6 py-3 text-left text-xs font-semibold text-purple-800 uppercase tracking-wider">Progress</th>
            </tr>
          </thead>
          <tbody id="deadlineTableBody" class="divide-y divide-gray-100 bg-white">
            <tr><td colspan="4" class="text-center py-8 text-gray-400">No upcoming deadlines.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script type="module">
    import { supabase } from '../js/supabase.js';

    // ---- AUTH GUARD ----
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) {
      window.location.href = '/index.html';
      throw new Error('Redirecting to login...');
    }
    document.getElementById('userEmail').textContent = user.email;

    // ---- LOGOUT ----
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = '/index.html';
    });

    // ---- Helper ----
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ---- Load Dashboard Data ----
    async function loadDashboard() {
      // 1. Get all projects for this user
      const { data: projects, error: projectsError } = await supabase
        .from('projects')
        .select('id, name, status, progress, deadline')
        .eq('user_id', user.id);

      if (projectsError) {
        console.error('Error loading projects:', projectsError);
        return;
      }

      // 2. Get all tasks for this user's projects
      // We need tasks linked to these project IDs
      const projectIds = projects.map(p => p.id);
      let tasks = [];
      if (projectIds.length > 0) {
        const { data: tasksData, error: tasksError } = await supabase
          .from('tasks')
          .select('status, project_id')
          .in('project_id', projectIds);

        if (tasksError) {
          console.error('Error loading tasks:', tasksError);
        } else {
          tasks = tasksData || [];
        }
      }

      // ---- Stats ----
      const totalProjects = projects.length;
      const totalTasks = tasks.length;
      const completedTasks = tasks.filter(t => t.status === 'Completed').length;

      // Upcoming deadlines: projects with deadline within next 7 days and not completed/archived
      const today = new Date();
      const nextWeek = new Date(today);
      nextWeek.setDate(today.getDate() + 7);

      const upcoming = projects.filter(p => {
        if (!p.deadline) return false;
        const deadlineDate = new Date(p.deadline);
        return deadlineDate >= today && deadlineDate <= nextWeek && p.status !== 'Completed' && p.status !== 'Archived';
      });

      document.getElementById('totalProjects').textContent = totalProjects;
      document.getElementById('totalTasks').textContent = totalTasks;
      document.getElementById('completedTasks').textContent = completedTasks;
      document.getElementById('upcomingDeadlines').textContent = upcoming.length;

      // ---- Project Status Distribution ----
      const statusCounts = {
        'Active': 0,
        'On Hold': 0,
        'Completed': 0,
        'Archived': 0,
      };
      projects.forEach(p => {
        if (statusCounts.hasOwnProperty(p.status)) statusCounts[p.status]++;
        else statusCounts['Active']++; // fallback
      });

      // ---- Task Status Distribution ----
      const taskStatusCounts = {
        'Pending': 0,
        'In Progress': 0,
        'Completed': 0,
      };
      tasks.forEach(t => {
        if (taskStatusCounts.hasOwnProperty(t.status)) taskStatusCounts[t.status]++;
        else taskStatusCounts['Pending']++;
      });

      // ---- Render Charts (using Chart.js) ----
      const projectCtx = document.getElementById('projectStatusChart').getContext('2d');
      new Chart(projectCtx, {
        type: 'pie',
        data: {
          labels: Object.keys(statusCounts),
          datasets: [{
            data: Object.values(statusCounts),
            backgroundColor: ['#8B5CF6', '#FBBF24', '#34D399', '#9CA3AF'], // purple, yellow, green, gray
            borderWidth: 2,
            borderColor: '#fff',
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { boxWidth: 12, font: { size: 12 } }
            }
          }
        }
      });

      const taskCtx = document.getElementById('taskStatusChart').getContext('2d');
      new Chart(taskCtx, {
        type: 'pie',
        data: {
          labels: Object.keys(taskStatusCounts),
          datasets: [{
            data: Object.values(taskStatusCounts),
            backgroundColor: ['#FCD34D', '#60A5FA', '#34D399'],
            borderWidth: 2,
            borderColor: '#fff',
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { boxWidth: 12, font: { size: 12 } }
            }
          }
        }
      });

      // ---- Upcoming Deadlines Table ----
      const tbody = document.getElementById('deadlineTableBody');
      if (upcoming.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-gray-400">No upcoming deadlines in the next 7 days.</td></tr>`;
        return;
      }

      // Sort by deadline
      upcoming.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));

      tbody.innerHTML = upcoming.map(p => `
        <tr>
          <td class="px-6 py-4 font-medium text-gray-800">${escapeHtml(p.name)}</td>
          <td class="px-6 py-4 text-sm text-gray-600">${new Date(p.deadline).toLocaleDateString()}</td>
          <td class="px-6 py-4">
            <span class="inline-flex px-3 py-1 text-xs font-semibold rounded-full bg-purple-100 text-purple-800">${p.status || 'Active'}</span>
          </td>
          <td class="px-6 py-4">
            <div class="flex items-center gap-2">
              <span class="text-sm font-medium text-gray-700">${p.progress || 0}%</span>
              <div class="flex-1 max-w-[100px] h-2 bg-gray-200 rounded-full overflow-hidden">
                <div class="h-full bg-purple-600 rounded-full" style="width: ${p.progress || 0}%"></div>
              </div>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // ---- Load ----
    loadDashboard();
  </script>
</body>
</html>
